name: Deploy Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ci
    env:
      ANSIBLE_FORCE_COLOR: "true"
      PY_COLORS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ansible
        run: |
          apt-get update
          apt-get install -y ansible
      - name: Install Ansible Collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          # Save deploy key
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Determine key type and rename appropriately
          if head -1 ~/.ssh/deploy_key | grep -q "ed25519\|ED25519"; then
          mv ~/.ssh/deploy_key ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          KEY_FILE="~/.ssh/id_ed25519"
          else
          mv ~/.ssh/deploy_key ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          KEY_FILE="~/.ssh/id_rsa"
          fi
          # Create SSH config with explicit user
          cat > ~/.ssh/config << EOF
          Host laptop.oscarcorner.com
          HostName laptop.oscarcorner.com
          User ci
          IdentityFile ${KEY_FILE}
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy Docker
        run: make deploy_docker
