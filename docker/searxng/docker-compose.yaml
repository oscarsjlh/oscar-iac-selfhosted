services:
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - reverse-proxy-network
    volumes:
      - ./searxng.yaml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: https://search.oscarcorner.com/
      SEARXNG_VALKEY_URL: valkey://valkey:6379/0
    labels:
      traefik.enable: true
      traefik.http.routers.searxng.entrypoints: websecure
      traefik.http.routers.searxng.rule: Host(`search.oscarcorner.com`)
      traefik.http.services.searxng.loadbalancer.server.port: 8080
      traefik.http.routers.searxng.tls.certresolver: route53

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data/
    networks:
      - reverse-proxy-network

networks:
  reverse-proxy-network:
    external: true

volumes:
  valkey-data:
  searxng-cache:
