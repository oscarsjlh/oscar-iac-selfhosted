services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    networks:
      - reverse-proxy-network
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/London
      - PORT=5055 #optional
    labels:
      traefik.enable: true
      traefik.http.routers.searxng.entrypoints: websecure
      traefik.http.routers.searxng.rule: Host(`requests.oscarcorner.com`)
      traefik.http.services.searxng.loadbalancer.server.port: 5055
      traefik.http.routers.searxng.tls.certresolver: route53
    volumes:
      - ./config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

networks:
  reverse-proxy-network:
    external: true
