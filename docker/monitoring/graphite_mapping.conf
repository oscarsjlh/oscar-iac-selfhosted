# Graphite to Prometheus mapping for TrueNAS Scale metrics
# TrueNAS uses collectd-style graphite metrics

mappings:

# CPU metrics
- match: collectd.*.cpu.*.value
  name: cpu_usage
  labels:
    host: "$1"
    mode: "$3"

# Memory metrics
- match: collectd.*.memory.*.value
  name: memory_bytes
  labels:
    host: "$1"
    type_instance: "$3"

# Load metrics
- match: collectd.*.load.load.*.value
  name: system_load
  labels:
    host: "$1"

# Interface/network metrics - bytes
- match: collectd.*.interface.*.if_octets.*.value
  name: network_bytes
  labels:
    host: "$1"
    interface: "$3"
    direction: "$5"

# Interface/network metrics - packets
- match: collectd.*.interface.*.if_packets.*.value
  name: network_packets
  labels:
    host: "$1"
    interface: "$3"
    direction: "$5"

# Disk metrics - ops
- match: collectd.*.disk.*.disk_ops.*.value
  name: disk_ops
  labels:
    host: "$1"
    disk: "$3"
    direction: "$5"

# Disk metrics - time
- match: collectd.*.disk.*.disk_time.*.value
  name: disk_time
  labels:
    host: "$1"
    disk: "$3"
    direction: "$5"

# Disk metrics - bytes
- match: collectd.*.disk.*.disk_octets.*.value
  name: disk_bytes
  labels:
    host: "$1"
    disk: "$3"
    direction: "$5"

# ZFS/ARC metrics
- match: collectd.*.zfs_arc.*.value
  name: zfs_arc
  labels:
    host: "$1"
    type_instance: "$3"

# ZFS/ARC cache metrics
- match: collectd.*.zfs_arc_cache.*.value
  name: zfs_arc_cache
  labels:
    host: "$1"
    type_instance: "$4"

# Smart metrics - using regex to handle hyphens in attribute names
- match: 'collectd\.(.*)\.smart_(.+)\.gauge-(.+)\.value'
  match_type: regex
  name: smart_attribute
  labels:
    host: "$1"
    disk: "$2"
    attribute: "$3"

# Temperature metrics
- match: collectd.*.temperature.*.value
  name: temperature_celsius
  labels:
    host: "$1"
    sensor: "$3"

# Uptime metrics
- match: collectd.*.uptime.uptime.value
  name: uptime_seconds
  labels:
    host: "$1"

# Process metrics - using regex to handle hyphen in ps_state-
- match: 'collectd\.(.*)\.processes\.ps_state-(.+)\.value'
  match_type: regex
  name: processes_state
  labels:
    host: "$1"
    state: "$2"

# Docker container metrics
- match: collectd.*.docker.container_stats.*.*.value
  name: docker_container_stats
  labels:
    host: "$1"
    container: "$4"
    metric: "$5"

# Default catch-all mapping for unmapped metrics
- match: '.*'
  match_type: regex
  name: graphite_unmapped
  labels:
    original_metric: "$0"
