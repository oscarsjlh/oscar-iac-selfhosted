# Graphite to Prometheus mapping for TrueNAS Scale metrics
# TrueNAS Scale uses format: scale.ns.<metric_name>

mappings:

# Memory info metrics
- match: scale.ns.truenas_meminfo.*.*
  name: truenas_memory_bytes
  labels:
    type: "$3"

# ARC stats - size
- match: scale.ns.truenas_arcstats.size.*
  name: truenas_arc_size_bytes
  labels:
    type: "$3"

# ARC stats - free
- match: scale.ns.truenas_arcstats.free.*
  name: truenas_arc_free_bytes
  labels:
    type: "$3"

# ARC stats - available
- match: scale.ns.truenas_arcstats.avail.*
  name: truenas_arc_available_bytes
  labels:
    type: "$3"

# Network speed
- match: scale.ns.net_speed.*.speed
  name: truenas_network_speed_bits
  labels:
    interface: "$3"

# System uptime
- match: scale.ns.system.uptime.*
  name: truenas_system_uptime_seconds
  labels:
    type: "$3"

# Cgroup memory usage
- match: 'scale\.ns\.cgroup_([0-9a-f]+)\.mem_usage_(.+)\.(.+)'
  match_type: regex
  name: truenas_cgroup_memory_bytes
  labels:
    cgroup_id: "$1"
    metric_type: "$2"
    resource: "$3"

# CPU temperature
- match: scale.ns.cputemp.*.*
  name: truenas_cpu_temperature_celsius
  labels:
    cpu: "$3"
    type: "$4"

# Disk temperature
- match: scale.ns.disktemp.*.*
  name: truenas_disk_temperature_celsius
  labels:
    disk: "$3"
    type: "$4"

# Interface traffic
- match: scale.ns.if_octets.*.*
  name: truenas_network_bytes_total
  labels:
    interface: "$3"
    direction: "$4"

# Interface packets
- match: scale.ns.if_packets.*.*
  name: truenas_network_packets_total
  labels:
    interface: "$3"
    direction: "$4"

# Load averages
- match: scale.ns.load.load.*
  name: truenas_system_load
  labels:
    interval: "$3"

# VM stats
- match: scale.ns.vmstat.*.*
  name: truenas_vmstat
  labels:
    metric: "$3"
    type: "$4"

# Processes states (using regex for hyphen)
- match: 'scale\.ns\.processes\.ps_state-(.+)\.value'
  match_type: regex
  name: truenas_processes_state
  labels:
    state: "$1"

# Smart metrics (using regex for smart_ prefix and gauge- prefix)
- match: 'scale\.ns\.smart_(.+)\.gauge-(.+)\.value'
  match_type: regex
  name: truenas_smart_attribute
  labels:
    disk: "$1"
    attribute: "$2"

# NFS stats
- match: scale.ns.nfsstat.*.*
  name: truenas_nfsstat
  labels:
    operation: "$3"
    type: "$4"

# ZFS dataset usage
- match: scale.ns.zfs_dataset.*.*
  name: truenas_zfs_dataset_bytes
  labels:
    dataset: "$3"
    type: "$4"

# ZFS pool stats
- match: scale.ns.zfs_pool.*.*
  name: truenas_zfs_pool
  labels:
    pool: "$3"
    metric: "$4"

# Disk operations
- match: scale.ns.disk_ops.*.*
  name: truenas_disk_ops_total
  labels:
    disk: "$3"
    direction: "$4"

# Disk time
- match: scale.ns.disk_time.*.*
  name: truenas_disk_time_seconds
  labels:
    disk: "$3"
    direction: "$4"

# Disk bytes
- match: scale.ns.disk_octets.*.*
  name: truenas_disk_bytes_total
  labels:
    disk: "$3"
    direction: "$4"

# Default catch-all mapping for any remaining unmapped metrics
- match: '.*'
  match_type: regex
  name: graphite_unmapped
  labels:
    original_metric: "$0"
