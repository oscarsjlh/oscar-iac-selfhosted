# Graphite to Prometheus mapping for TrueNAS Scale metrics
# TrueNAS uses collectd-style graphite metrics

# CPU metrics
collectd.*.cpu.*.value
type="cpu"
host="$1"
mode="$3"

# Memory metrics
collectd.*.memory.*.value
type="memory"
host="$1"
type_instance="$3"

# Load metrics
collectd.*.load.load.*.value
type="load"
host="$1"

# Interface/network metrics
collectd.*.interface.*.if_octets.*.value
type="interface_bytes"
host="$1"
interface="$3"
direction="$5"

collectd.*.interface.*.if_packets.*.value
type="interface_packets"
host="$1"
interface="$3"
direction="$5"

# Disk metrics
collectd.*.disk.*.disk_ops.*.value
type="disk_ops"
host="$1"
disk="$3"
direction="$5"

collectd.*.disk.*.disk_time.*.value
type="disk_time"
host="$1"
disk="$3"
direction="$5"

collectd.*.disk.*.disk_octets.*.value
type="disk_bytes"
host="$1"
disk="$3"
direction="$5"

# ZFS/Pool metrics
collectd.*.zfs_arc.*.value
type="zfs_arc"
host="$1"
type_instance="$3"

collectd.*.zfs_arc_cache.*.value
type="zfs_arc_cache"
host="$1"
type_instance="$4"

# Smart metrics
collectd.*.smart_.*.gauge-*.value
type="smart"
host="$1"
disk="$3"
attribute="$5"

# Temperature metrics
collectd.*.temperature.*.value
type="temperature"
host="$1"
sensor="$3"

# System/uptime
collectd.*.uptime.uptime.value
type="uptime"
host="$1"

# Process metrics
collectd.*.processes.ps_state-*.value
type="processes_state"
host="$1"
state="$4"

# Docker container metrics (if available)
collectd.*.docker.container_stats.*.*.value
type="docker_container"
host="$1"
container="$4"
metric="$5"

# Default catch-all mapping
*
type="graphite"
name="$0"
