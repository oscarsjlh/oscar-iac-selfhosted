networks:
  monitoring:
    driver: bridge
  reverse-proxy-network:
    external: true
volumes:
  prometheus_data: {}
  grafana_storage: {}
services:
  node-exporter:
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node-exporter/textfile:/etc/node-exporter/textfile
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.textfile.directory=/etc/node-exporter/textfile"
    expose:
      - 9100
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    labels:
      traefik.enable: true
      # increase readingTimeouts for the entrypoint used here
      traefik.http.routers.prometheus.entrypoints: websecure
      traefik.http.routers.prometheus.rule: Host(`prometheus.oscarcorner.com`)
      traefik.http.services.prometheus.loadbalancer.server.port: 9090
      traefik.http.routers.prometheus.tls.certresolver: route53
      traefik.docker.network: reverse-proxy-network

    expose:
      - 9090
    networks:
      - monitoring
      - reverse-proxy-network
  cadvisor:
    container_name: cadvisor
    image: ghcr.io/google/cadvisor:0.56.2@sha256:5534ae91cbf3428998d60428d107cfdd97272d80658534ac6e54d8ce3b0c4d72
    command:
      - "-housekeeping_interval=10s"
      - "-docker_only=true"
      - "store_container_labels=false"
    volumes:
      - "/:/rootfs"
      - "/var/run:/var/run"
      - "/sys:/sys"
      - "/var/lib/docker/:/var/lib/docker"
      - "/dev/disk/:/dev/disk"
    privileged: true
    networks:
      - monitoring
    devices:
      - "/dev/kmsg"
  grafana:
    image: grafana/grafana:12.4.3@sha256:2e986801428cd689c2358605289c90ab37d2b39e24808874971f54c99bcdc412
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.oscarcorner.com/
    labels:
      traefik.enable: true
      # increase readingTimeouts for the entrypoint used here
      traefik.http.routers.grafana.entrypoints: websecure
      traefik.http.routers.grafana.rule: Host(`grafana.oscarcorner.com`)
      traefik.http.services.grafana.loadbalancer.server.port: 3000
      traefik.http.routers.grafana.tls.certresolver: route53
      traefik.docker.network: reverse-proxy-network
    volumes:
      - "grafana_storage:/var/lib/grafana"
    networks:
      - monitoring
      - reverse-proxy-network
  # dcgm-exporter:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities:
  #               - gpu
  #   cap_add:
  #     - SYS_ADMIN
  #   ports:
  #     - 9400:9400
  #   image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless@sha256:ed594cf53fe6942e84b07b0740cdcbb249fa4b39cb21feeebf93881ae51f0b5e
  #   networks:
  #     - monitoring
  nut-exporter:
    # Stable v1
    image: hon95/prometheus-nut-exporter:1@sha256:a9bfbbae3b12a6486e6e4b933a69a79d01342db27346d6b4cd5512f4eef6b111
    environment:
      - TZ=Europe/London
      - HTTP_PATH=/metrics
      # Defaults
      #- RUST_LOG=info
      #- HTTP_PORT=9995
      #- HTTP_PATH=/nut
      #- LOG_REQUESTS_CONSOLE=false
      #- PRINT_METRICS_AND_EXIT=false
    ports:
      - "9995:9995/tcp"
    networks:
      - monitoring
  vector:
    image: timberio/vector:0.54.X-debian@sha256:7311e050492a452b762d82488b0dd26312c3099b7274e4300c6c01b6e9f9c6d9
    container_name: vector
    command: --config /etc/vector/vector.toml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /etc/machine-id:/etc/machine-id:ro
    ports:
      - "514:514/udp"
    restart: unless-stopped
    networks:
      - monitoring
  loki:
    image: grafana/loki:3.7.1@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring
  graphite-exporter:
    image: ghcr.io/supporterino/truenas-graphite-to-prometheus:v2.2.1@sha256:60e7645f74a3243d7fb9e6a15c05ea3b4cddfd2bc7ba9e2b11321ce1d38286dd
    container_name: graphite-exporter
    restart: unless-stopped
    ports:
      - "9109:9109/tcp" # Graphite input (plaintext)
      - "9109:9109/udp" # Graphite input (UDP)
      - "9108:9108/tcp" # Prometheus metrics output
    networks:
      - monitoring
