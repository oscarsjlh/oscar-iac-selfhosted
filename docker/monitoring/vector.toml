[sources.docker_logs]
type = "docker_logs"

[sources.journald]
type = "journald"
since_now = false

[sources.syslog]
type = "syslog"
mode = "udp"
address = "0.0.0.0:514"


[transforms.syslog_parse]
type = "remap"
inputs = ["syslog"]
source = '''
# Extract fields from syslog
.source_host = .hostname
.app_name = .appname || "unknown"
.facility = .facility || "unknown"
.severity = .severity || "info"
.message = string!(.message)

# Map severity to log level
.level = if .severity == 0 {
  "emergency"
} else if .severity == 1 {
  "alert"
} else if .severity == 2 {
  "critical"
} else if .severity == 3 {
  "error"
} else if .severity == 4 {
  "warning"
} else if .severity == 5 {
  "notice"
} else if .severity == 6 {
  "info"
} else {
  "debug"
}
'''

[transforms.syslog_labels]
type = "remap"
inputs = ["syslog_parse"]
source = '''
.loki_labels = {
  "job": "syslog",
  "host": .source_host,
  "app": .app_name,
  "facility": .facility,
  "level": .level
}
'''

[transforms.normalize]
type = "remap"
inputs = ["journald"]
source = '''
.timestamp = ._SOURCE_REALTIME_TIMESTAMP
.message = .MESSAGE
.host = get_hostname!()
.unit = ._SYSTEMD_UNIT || "unknown"
.level = .PRIORITY || "unknown"
.syslog_identifier = .SYSLOG_IDENTIFIER || "unknown"

# Identify if this is a cron-related job
.is_cron = if match(string!(.unit), r'^(cron|.*\.timer)') || match(string!(.syslog_identifier), r'(CRON|cron)') {
  "true"
} else {
  "false"
}
'''

[transforms.journald_labels]
type = "remap"
inputs = ["normalize"]
source = '''
.loki_labels = {
  "job": "systemd",
  "host": .host,
  "unit": .unit,
  "level": .level,
  "is_cron": .is_cron,
  "syslog_identifier": .syslog_identifier
}
'''

[transforms.parse_and_enrich]
type = "remap"
inputs = ["docker_logs"]
source = '''
msg = string(.message) ?? ""
parsed, err = parse_json(msg)
if err == null && is_object(parsed) {
  .log = parsed
  if exists(.log.level) {
    .level = string!(.log.level)
  } else {
    .level = "info"
  }
} else {
  .level = "info"
}
'''

[transforms.docker_labels]
type = "remap"
inputs = ["parse_and_enrich"]
source = '''
.service = if exists(.label."com.docker.compose.service") {
  string!(.label."com.docker.compose.service")
} else {
  "unknown"
}
.project = if exists(.label."com.docker.compose.project") {
  string!(.label."com.docker.compose.project")
} else {
  "unknown"
}

.loki_labels = {
  "job": "docker",
  "container": .container_name,
  "image": .image,
  "service": .service,
  "project": .project,
  "level": .level
}
'''

[sinks.console]
type = "console"
inputs = ["parse_and_enrich"]
target = "stdout"
encoding.codec = "json"
[sinks.loki]
type = "loki"
inputs = ["journald_labels", "docker_labels", "syslog_labels"]
endpoint = "http://loki:3100"
compression = "gzip"
encoding.codec = "json"

[sinks.loki.labels]
"*" = "{{ loki_labels }}"

